name: "ssh-releases-deploy"
description: "Use shell script ssh to connect to your server for code deployment"
author: "zhiqiang(zhiqiang2033@gmail.com)"

inputs:
  project_path:
    description: "Local project path. Defaults to current directory."
    required: false
  project_name:
    description: "Project name. Defaults to the directory name."
    required: false
  project_version:
    description: "Deployment version. Defaults to current timestamp."
    required: false
  tar_args:
    description: "Extra arguments passed to tar for packaging, e.g., --exclude='.git' --exclude='node_modules'"
    required: false
  deploy_hosts:
    description: "Target hosts, format: user:pass@host[:port] or user@host[:port]. Multiple hosts separated by spaces."
    required: true
  remote_dir:
    description: "Deploy to the root directory on the server"
    required: false
    default: "/data/apps"
  post_deploy_cmd:
    description: "Command to run on remote server after deployment."
    required: false

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.project_path }}
    - ${{ inputs.project_name }}
    - ${{ inputs.project_version }}
    - ${{ inputs.tar_args }}
    - ${{ inputs.deploy_hosts }}
    - ${{ inputs.remote_dir }}
    - ${{ inputs.post_deploy_cmd }}
